name: Build and Release containers-common .deb Packages

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      build_version: ${{ steps.vars.outputs.build_version }}
      cc_tag: ${{ steps.vars.outputs.cc_tag }}
      cc_version: ${{ steps.vars.outputs.cc_version }}
      cc_archive_sha256: ${{ steps.vars.outputs.cc_archive_sha256 }}
      release_revision: ${{ steps.tags.outputs.release_revision }}
      noble_release_tag: ${{ steps.tags.outputs.noble_release_tag }}
      trixie_release_tag: ${{ steps.tags.outputs.trixie_release_tag }}
      resolute_release_tag: ${{ steps.tags.outputs.resolute_release_tag }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute shared build variables
        id: vars
        run: |
          source packaging/versions.env
          echo "build_version=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "cc_tag=${CONTAINERS_COMMON_TAG}" >> "$GITHUB_OUTPUT"
          echo "cc_version=${CONTAINERS_COMMON_VERSION}" >> "$GITHUB_OUTPUT"
          echo "cc_archive_sha256=${CONTAINERS_COMMON_ARCHIVE_SHA256}" >> "$GITHUB_OUTPUT"
      - name: Resolve release tags
        id: tags
        run: |
          CC_VERSION="${{ steps.vars.outputs.cc_version }}"
          BUILD_VERSION="${{ steps.vars.outputs.build_version }}"

          # Find the greatest existing revision across all distros so all
          # releases from this run share the same numeric revision.
          MAX_REVISION=0
          for DISTRO in noble trixie resolute; do
            DISTRO_MAX=0
            if gh release view "containers-common-v${CC_VERSION}-${DISTRO}-${BUILD_VERSION}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
              DISTRO_MAX=1
            fi

            REVISION=1
            while gh release view "containers-common-v${CC_VERSION}-${DISTRO}-${BUILD_VERSION}-${REVISION}" --repo "${{ github.repository }}" >/dev/null 2>&1; do
              DISTRO_MAX="${REVISION}"
              REVISION=$((REVISION + 1))
            done

            if [[ "${DISTRO_MAX}" -gt "${MAX_REVISION}" ]]; then
              MAX_REVISION="${DISTRO_MAX}"
            fi
          done

          RELEASE_REVISION=$((MAX_REVISION + 1))
          echo "release_revision=${RELEASE_REVISION}" >> "$GITHUB_OUTPUT"

          for DISTRO in noble trixie resolute; do
            TAG="containers-common-v${CC_VERSION}-${DISTRO}-${BUILD_VERSION}-${RELEASE_REVISION}"
            echo "${DISTRO}_release_tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "Resolved ${DISTRO} release tag: ${TAG}"
          done

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          # containers-common is Architecture: all; one build per distro suffices.
          - distro: noble
            dockerfile: docker/Dockerfile.containers-common-ubuntu-noble
          - distro: trixie
            dockerfile: docker/Dockerfile.containers-common-debian-trixie
          - distro: resolute
            dockerfile: docker/Dockerfile.containers-common-ubuntu-resolute
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build .deb package
        env:
          BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
          BUILD_REVISION: ${{ needs.prepare.outputs.release_revision }}
          CONTAINERS_COMMON_TAG: ${{ needs.prepare.outputs.cc_tag }}
          CONTAINERS_COMMON_VERSION: ${{ needs.prepare.outputs.cc_version }}
          CONTAINERS_COMMON_ARCHIVE_SHA256: ${{ needs.prepare.outputs.cc_archive_sha256 }}
        run: |
          docker build \
            --pull \
            --no-cache \
            --build-arg "DISTRO=${{ matrix.distro }}" \
            --build-arg "BUILD_VERSION=${BUILD_VERSION}" \
            --build-arg "BUILD_REVISION=${BUILD_REVISION}" \
            --build-arg "CONTAINERS_COMMON_TAG=${CONTAINERS_COMMON_TAG}" \
            --build-arg "CONTAINERS_COMMON_VERSION=${CONTAINERS_COMMON_VERSION}" \
            --build-arg "CONTAINERS_COMMON_ARCHIVE_SHA256=${CONTAINERS_COMMON_ARCHIVE_SHA256}" \
            --build-arg "TARGET_ARCH=amd64" \
            --target artifact-export \
            --output "type=local,dest=output" \
            --file "${{ matrix.dockerfile }}" \
            .
      - name: List built artifacts
        run: find output/ -type f | sort
      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: containers-common-debs-${{ matrix.distro }}
          path: output/${{ matrix.distro }}/${{ needs.prepare.outputs.build_version }}/amd64/*.deb
          retention-days: 7
          if-no-files-found: error
      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: containers-common-metadata-${{ matrix.distro }}
          path: |
            output/${{ matrix.distro }}/${{ needs.prepare.outputs.build_version }}/amd64/SHA256SUMS
            output/${{ matrix.distro }}/${{ needs.prepare.outputs.build_version }}/amd64/build.log
          retention-days: 30
          if-no-files-found: warn

  release-noble:
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: containers-common-debs-noble
          path: debs
      - name: Generate checksums
        run: |
          cd debs
          find . -name '*.deb' -exec sha256sum {} \; | sed 's|  \./|  |' | sort > SHA256SUMS
          cat SHA256SUMS
      - name: Create noble release
        run: |
          CC_VERSION="${{ needs.prepare.outputs.cc_version }}"
          BUILD_VERSION="${{ needs.prepare.outputs.build_version }}"
          RELEASE_TAG="${{ needs.prepare.outputs.noble_release_tag }}"
          RELEASE_VERSION="${RELEASE_TAG#containers-common-v${CC_VERSION}-noble-}"

          gh release create "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --prerelease \
            --title "containers-common ${CC_VERSION} for Ubuntu 24.04 (noble) - ${RELEASE_VERSION}" \
            --notes "$(cat <<EOF
          ## containers-common ${CC_VERSION} .deb package for Ubuntu 24.04 (noble)

          Config files (containers.conf, policy.json, shortnames.conf, seccomp.json) for Podman 6.0.
          Architecture: all.

          Build date: ${BUILD_VERSION}
          Upstream tag: ${{ needs.prepare.outputs.cc_tag }}

          ### SHA256 Checksums
          \`\`\`
          $(cat debs/SHA256SUMS)
          \`\`\`
          EOF
          )" \
            debs/*.deb debs/SHA256SUMS

  release-trixie:
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: containers-common-debs-trixie
          path: debs
      - name: Generate checksums
        run: |
          cd debs
          find . -name '*.deb' -exec sha256sum {} \; | sed 's|  \./|  |' | sort > SHA256SUMS
          cat SHA256SUMS
      - name: Create trixie release
        run: |
          CC_VERSION="${{ needs.prepare.outputs.cc_version }}"
          BUILD_VERSION="${{ needs.prepare.outputs.build_version }}"
          RELEASE_TAG="${{ needs.prepare.outputs.trixie_release_tag }}"
          RELEASE_VERSION="${RELEASE_TAG#containers-common-v${CC_VERSION}-trixie-}"

          gh release create "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --prerelease \
            --title "containers-common ${CC_VERSION} for Debian 13 (trixie) - ${RELEASE_VERSION}" \
            --notes "$(cat <<EOF
          ## containers-common ${CC_VERSION} .deb package for Debian 13 (trixie)

          Config files (containers.conf, policy.json, shortnames.conf, seccomp.json) for Podman 6.0.
          Architecture: all.

          Build date: ${BUILD_VERSION}
          Upstream tag: ${{ needs.prepare.outputs.cc_tag }}

          ### SHA256 Checksums
          \`\`\`
          $(cat debs/SHA256SUMS)
          \`\`\`
          EOF
          )" \
            debs/*.deb debs/SHA256SUMS

  release-resolute:
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: containers-common-debs-resolute
          path: debs
      - name: Generate checksums
        run: |
          cd debs
          find . -name '*.deb' -exec sha256sum {} \; | sed 's|  \./|  |' | sort > SHA256SUMS
          cat SHA256SUMS
      - name: Create resolute release
        run: |
          CC_VERSION="${{ needs.prepare.outputs.cc_version }}"
          BUILD_VERSION="${{ needs.prepare.outputs.build_version }}"
          RELEASE_TAG="${{ needs.prepare.outputs.resolute_release_tag }}"
          RELEASE_VERSION="${RELEASE_TAG#containers-common-v${CC_VERSION}-resolute-}"

          gh release create "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --prerelease \
            --title "containers-common ${CC_VERSION} for Ubuntu 26.04 (resolute) - ${RELEASE_VERSION}" \
            --notes "$(cat <<EOF
          ## containers-common ${CC_VERSION} .deb package for Ubuntu 26.04 (resolute)

          Config files (containers.conf, policy.json, shortnames.conf, seccomp.json) for Podman 6.0.
          Architecture: all.

          Build date: ${BUILD_VERSION}
          Upstream tag: ${{ needs.prepare.outputs.cc_tag }}

          ### SHA256 Checksums
          \`\`\`
          $(cat debs/SHA256SUMS)
          \`\`\`
          EOF
          )" \
            debs/*.deb debs/SHA256SUMS
