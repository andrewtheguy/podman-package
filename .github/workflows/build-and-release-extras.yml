name: Build and Release Podman Companion .deb Packages

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.vars.outputs.build_version }}
      release_revision: ${{ steps.tags.outputs.release_revision }}
      release_tag: ${{ steps.tags.outputs.release_tag }}
      podman_version: ${{ steps.vars.outputs.podman_version }}
      passt_version: ${{ steps.vars.outputs.passt_version }}
      netavark_tag: ${{ steps.vars.outputs.netavark_tag }}
      netavark_version: ${{ steps.vars.outputs.netavark_version }}
      netavark_upstream_sha256: ${{ steps.vars.outputs.netavark_upstream_sha256 }}
      netavark_vendor_sha256: ${{ steps.vars.outputs.netavark_vendor_sha256 }}
      aardvark_tag: ${{ steps.vars.outputs.aardvark_tag }}
      aardvark_version: ${{ steps.vars.outputs.aardvark_version }}
      aardvark_upstream_sha256: ${{ steps.vars.outputs.aardvark_upstream_sha256 }}
      aardvark_vendor_sha256: ${{ steps.vars.outputs.aardvark_vendor_sha256 }}
      rust_version: ${{ steps.vars.outputs.rust_version }}
      crun_tag: ${{ steps.vars.outputs.crun_tag }}
      crun_version: ${{ steps.vars.outputs.crun_version }}
      crun_archive_sha256: ${{ steps.vars.outputs.crun_archive_sha256 }}
      conmon_tag: ${{ steps.vars.outputs.conmon_tag }}
      conmon_version: ${{ steps.vars.outputs.conmon_version }}
      conmon_archive_sha256: ${{ steps.vars.outputs.conmon_archive_sha256 }}
      cc_tag: ${{ steps.vars.outputs.cc_tag }}
      cc_version: ${{ steps.vars.outputs.cc_version }}
      cc_archive_sha256: ${{ steps.vars.outputs.cc_archive_sha256 }}
      cs_tag: ${{ steps.vars.outputs.cs_tag }}
      cs_version: ${{ steps.vars.outputs.cs_version }}
      cs_archive_sha256: ${{ steps.vars.outputs.cs_archive_sha256 }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute shared build variables
        id: vars
        run: |
          source packaging/versions.env
          {
            echo "build_version=$(date -u +%Y%m%d)"
            echo "podman_version=${PODMAN_TAG#v}"
            echo "passt_version=${PASST_VERSION}"
            echo "netavark_tag=${NETAVARK_TAG}"
            echo "netavark_version=${NETAVARK_TAG#v}"
            echo "netavark_upstream_sha256=${NETAVARK_UPSTREAM_SHA256}"
            echo "netavark_vendor_sha256=${NETAVARK_VENDOR_SHA256}"
            echo "aardvark_tag=${AARDVARK_TAG}"
            echo "aardvark_version=${AARDVARK_TAG#v}"
            echo "aardvark_upstream_sha256=${AARDVARK_UPSTREAM_SHA256}"
            echo "aardvark_vendor_sha256=${AARDVARK_VENDOR_SHA256}"
            echo "rust_version=${RUST_VERSION}"
            echo "crun_tag=${CRUN_TAG}"
            echo "crun_version=${CRUN_VERSION}"
            echo "crun_archive_sha256=${CRUN_ARCHIVE_SHA256}"
            echo "conmon_tag=${CONMON_TAG}"
            echo "conmon_version=${CONMON_VERSION}"
            echo "conmon_archive_sha256=${CONMON_ARCHIVE_SHA256}"
            echo "cc_tag=${CONTAINERS_COMMON_TAG}"
            echo "cc_version=${CONTAINERS_COMMON_VERSION}"
            echo "cc_archive_sha256=${CONTAINERS_COMMON_ARCHIVE_SHA256}"
            echo "cs_tag=${CONTAINERS_STORAGE_TAG}"
            echo "cs_version=${CONTAINERS_STORAGE_VERSION}"
            echo "cs_archive_sha256=${CONTAINERS_STORAGE_ARCHIVE_SHA256}"
          } >> "$GITHUB_OUTPUT"
      - name: Resolve release tag
        id: tags
        run: |
          BUILD_VERSION="${{ steps.vars.outputs.build_version }}"

          REVISION=1
          while gh release view "podman-extras-${BUILD_VERSION}-${REVISION}" --repo "${{ github.repository }}" >/dev/null 2>&1; do
            REVISION=$((REVISION + 1))
          done

          RELEASE_TAG="podman-extras-${BUILD_VERSION}-${REVISION}"
          echo "release_revision=${REVISION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: ${RELEASE_TAG} (revision ${REVISION})"
      - name: Create draft release
        run: |
          PODMAN_VERSION="${{ steps.vars.outputs.podman_version }}"
          BUILD_VERSION="${{ steps.vars.outputs.build_version }}"
          RELEASE_TAG="${{ steps.tags.outputs.release_tag }}"
          RELEASE_REVISION="${{ steps.tags.outputs.release_revision }}"

          gh release create "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --draft \
            --prerelease \
            --title "Podman ${PODMAN_VERSION} companion .deb packages - ${BUILD_VERSION}-${RELEASE_REVISION}" \
            --notes "$(cat <<EOF
          ## Podman ${PODMAN_VERSION} companion .deb packages

          Supporting packages required alongside Podman ${PODMAN_VERSION}, built
          or pinned for amd64 and arm64 (containers-common is \`Architecture: all\`):
          - passt ${{ steps.vars.outputs.passt_version }} (exact Ubuntu and Debian binaries)
          - netavark ${{ steps.vars.outputs.netavark_version }}
          - aardvark-dns ${{ steps.vars.outputs.aardvark_version }}
          - crun ${{ steps.vars.outputs.crun_version }}
          - conmon ${{ steps.vars.outputs.conmon_version }}
          - containers-common ${{ steps.vars.outputs.cc_version }}
          - containers-storage ${{ steps.vars.outputs.cs_version }}

          Targets:
          - Ubuntu 24.04 (noble)
          - Ubuntu 26.04 (resolute)
          - Debian 13 (trixie)

          Build date: ${BUILD_VERSION}
          Build revision: ${RELEASE_REVISION}

          SHA256 checksums are attached as \`SHA256SUMS\`.
          EOF
          )"

  fetch-passt:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch pinned passt .deb packages
        run: |
          for origin in ubuntu debian; do
            for arch in amd64 arm64; do
              ./scripts/fetch-passt-deb.sh "${origin}" "${arch}" output
            done
          done
      - name: List pinned artifacts
        run: find output/ -type f | sort
      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: passt-debs-pinned
          path: output/*.deb
          retention-days: 7
          if-no-files-found: error

  build-compiled:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - product: netavark
            distro_family: ubuntu
            distro: noble
            base_image: ubuntu:noble
            arch: amd64
            runner: ubuntu-latest
          - product: netavark
            distro_family: ubuntu
            distro: noble
            base_image: ubuntu:noble
            arch: arm64
            runner: ubuntu-24.04-arm
          - product: netavark
            distro_family: ubuntu
            distro: resolute
            base_image: ubuntu:resolute
            arch: amd64
            runner: ubuntu-latest
          - product: netavark
            distro_family: ubuntu
            distro: resolute
            base_image: ubuntu:resolute
            arch: arm64
            runner: ubuntu-24.04-arm
          - product: netavark
            distro_family: debian
            distro: trixie
            base_image: debian:trixie
            arch: amd64
            runner: ubuntu-latest
          - product: netavark
            distro_family: debian
            distro: trixie
            base_image: debian:trixie
            arch: arm64
            runner: ubuntu-24.04-arm
          - product: aardvark-dns
            distro_family: ubuntu
            distro: noble
            base_image: ubuntu:noble
            arch: amd64
            runner: ubuntu-latest
          - product: aardvark-dns
            distro_family: ubuntu
            distro: noble
            base_image: ubuntu:noble
            arch: arm64
            runner: ubuntu-24.04-arm
          - product: aardvark-dns
            distro_family: ubuntu
            distro: resolute
            base_image: ubuntu:resolute
            arch: amd64
            runner: ubuntu-latest
          - product: aardvark-dns
            distro_family: ubuntu
            distro: resolute
            base_image: ubuntu:resolute
            arch: arm64
            runner: ubuntu-24.04-arm
          - product: aardvark-dns
            distro_family: debian
            distro: trixie
            base_image: debian:trixie
            arch: amd64
            runner: ubuntu-latest
          - product: aardvark-dns
            distro_family: debian
            distro: trixie
            base_image: debian:trixie
            arch: arm64
            runner: ubuntu-24.04-arm
          - product: crun
            distro_family: ubuntu
            distro: noble
            base_image: ubuntu:noble
            arch: amd64
            runner: ubuntu-latest
          - product: crun
            distro_family: ubuntu
            distro: noble
            base_image: ubuntu:noble
            arch: arm64
            runner: ubuntu-24.04-arm
          - product: crun
            distro_family: ubuntu
            distro: resolute
            base_image: ubuntu:resolute
            arch: amd64
            runner: ubuntu-latest
          - product: crun
            distro_family: ubuntu
            distro: resolute
            base_image: ubuntu:resolute
            arch: arm64
            runner: ubuntu-24.04-arm
          - product: crun
            distro_family: debian
            distro: trixie
            base_image: debian:trixie
            arch: amd64
            runner: ubuntu-latest
          - product: crun
            distro_family: debian
            distro: trixie
            base_image: debian:trixie
            arch: arm64
            runner: ubuntu-24.04-arm
          - product: conmon
            distro_family: ubuntu
            distro: noble
            base_image: ubuntu:noble
            arch: amd64
            runner: ubuntu-latest
          - product: conmon
            distro_family: ubuntu
            distro: noble
            base_image: ubuntu:noble
            arch: arm64
            runner: ubuntu-24.04-arm
          - product: conmon
            distro_family: ubuntu
            distro: resolute
            base_image: ubuntu:resolute
            arch: amd64
            runner: ubuntu-latest
          - product: conmon
            distro_family: ubuntu
            distro: resolute
            base_image: ubuntu:resolute
            arch: arm64
            runner: ubuntu-24.04-arm
          - product: conmon
            distro_family: debian
            distro: trixie
            base_image: debian:trixie
            arch: amd64
            runner: ubuntu-latest
          - product: conmon
            distro_family: debian
            distro: trixie
            base_image: debian:trixie
            arch: arm64
            runner: ubuntu-24.04-arm
          - product: containers-storage
            distro_family: ubuntu
            distro: noble
            base_image: ubuntu:noble
            arch: amd64
            runner: ubuntu-latest
          - product: containers-storage
            distro_family: ubuntu
            distro: noble
            base_image: ubuntu:noble
            arch: arm64
            runner: ubuntu-24.04-arm
          - product: containers-storage
            distro_family: ubuntu
            distro: resolute
            base_image: ubuntu:resolute
            arch: amd64
            runner: ubuntu-latest
          - product: containers-storage
            distro_family: ubuntu
            distro: resolute
            base_image: ubuntu:resolute
            arch: arm64
            runner: ubuntu-24.04-arm
          - product: containers-storage
            distro_family: debian
            distro: trixie
            base_image: debian:trixie
            arch: amd64
            runner: ubuntu-latest
          - product: containers-storage
            distro_family: debian
            distro: trixie
            base_image: debian:trixie
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Build .deb package
        env:
          BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
          BUILD_REVISION: ${{ needs.prepare.outputs.release_revision }}
          NETAVARK_TAG: ${{ needs.prepare.outputs.netavark_tag }}
          NETAVARK_UPSTREAM_SHA256: ${{ needs.prepare.outputs.netavark_upstream_sha256 }}
          NETAVARK_VENDOR_SHA256: ${{ needs.prepare.outputs.netavark_vendor_sha256 }}
          AARDVARK_TAG: ${{ needs.prepare.outputs.aardvark_tag }}
          AARDVARK_UPSTREAM_SHA256: ${{ needs.prepare.outputs.aardvark_upstream_sha256 }}
          AARDVARK_VENDOR_SHA256: ${{ needs.prepare.outputs.aardvark_vendor_sha256 }}
          RUST_VERSION: ${{ needs.prepare.outputs.rust_version }}
          CRUN_TAG: ${{ needs.prepare.outputs.crun_tag }}
          CRUN_VERSION: ${{ needs.prepare.outputs.crun_version }}
          CRUN_ARCHIVE_SHA256: ${{ needs.prepare.outputs.crun_archive_sha256 }}
          CONMON_TAG: ${{ needs.prepare.outputs.conmon_tag }}
          CONMON_VERSION: ${{ needs.prepare.outputs.conmon_version }}
          CONMON_ARCHIVE_SHA256: ${{ needs.prepare.outputs.conmon_archive_sha256 }}
          CONTAINERS_STORAGE_TAG: ${{ needs.prepare.outputs.cs_tag }}
          CONTAINERS_STORAGE_VERSION: ${{ needs.prepare.outputs.cs_version }}
          CONTAINERS_STORAGE_ARCHIVE_SHA256: ${{ needs.prepare.outputs.cs_archive_sha256 }}
        run: |
          docker build \
            --pull \
            --no-cache \
            --build-arg "BASE_IMAGE=${{ matrix.base_image }}" \
            --build-arg "PRODUCT=${{ matrix.product }}" \
            --build-arg "DISTRO_FAMILY=${{ matrix.distro_family }}" \
            --build-arg "DISTRO=${{ matrix.distro }}" \
            --build-arg "BUILD_VERSION=${BUILD_VERSION}" \
            --build-arg "BUILD_REVISION=${BUILD_REVISION}" \
            --build-arg "NETAVARK_TAG=${NETAVARK_TAG}" \
            --build-arg "NETAVARK_UPSTREAM_SHA256=${NETAVARK_UPSTREAM_SHA256}" \
            --build-arg "NETAVARK_VENDOR_SHA256=${NETAVARK_VENDOR_SHA256}" \
            --build-arg "AARDVARK_TAG=${AARDVARK_TAG}" \
            --build-arg "AARDVARK_UPSTREAM_SHA256=${AARDVARK_UPSTREAM_SHA256}" \
            --build-arg "AARDVARK_VENDOR_SHA256=${AARDVARK_VENDOR_SHA256}" \
            --build-arg "RUST_VERSION=${RUST_VERSION}" \
            --build-arg "CRUN_TAG=${CRUN_TAG}" \
            --build-arg "CRUN_VERSION=${CRUN_VERSION}" \
            --build-arg "CRUN_ARCHIVE_SHA256=${CRUN_ARCHIVE_SHA256}" \
            --build-arg "CONMON_TAG=${CONMON_TAG}" \
            --build-arg "CONMON_VERSION=${CONMON_VERSION}" \
            --build-arg "CONMON_ARCHIVE_SHA256=${CONMON_ARCHIVE_SHA256}" \
            --build-arg "CONTAINERS_STORAGE_TAG=${CONTAINERS_STORAGE_TAG}" \
            --build-arg "CONTAINERS_STORAGE_VERSION=${CONTAINERS_STORAGE_VERSION}" \
            --build-arg "CONTAINERS_STORAGE_ARCHIVE_SHA256=${CONTAINERS_STORAGE_ARCHIVE_SHA256}" \
            --build-arg "TARGET_ARCH=${{ matrix.arch }}" \
            --target artifact-export \
            --output "type=local,dest=output" \
            --file docker/Dockerfile \
            .
      - name: List built artifacts
        run: find output/ -type f | sort
      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.product }}-debs-${{ matrix.distro }}-${{ matrix.arch }}
          path: output/${{ matrix.distro }}/${{ needs.prepare.outputs.build_version }}/${{ matrix.arch }}/*.deb
          retention-days: 7
          if-no-files-found: error
      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.product }}-metadata-${{ matrix.distro }}-${{ matrix.arch }}
          path: |
            output/${{ matrix.distro }}/${{ needs.prepare.outputs.build_version }}/${{ matrix.arch }}/SHA256SUMS
            output/${{ matrix.distro }}/${{ needs.prepare.outputs.build_version }}/${{ matrix.arch }}/build.log
          retention-days: 30
          if-no-files-found: warn

  build-containers-common:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro_family: ubuntu
            distro: noble
            base_image: ubuntu:noble
          - distro_family: ubuntu
            distro: resolute
            base_image: ubuntu:resolute
          - distro_family: debian
            distro: trixie
            base_image: debian:trixie
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build .deb package
        env:
          BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
          BUILD_REVISION: ${{ needs.prepare.outputs.release_revision }}
          CONTAINERS_COMMON_TAG: ${{ needs.prepare.outputs.cc_tag }}
          CONTAINERS_COMMON_VERSION: ${{ needs.prepare.outputs.cc_version }}
          CONTAINERS_COMMON_ARCHIVE_SHA256: ${{ needs.prepare.outputs.cc_archive_sha256 }}
        run: |
          docker build \
            --pull \
            --no-cache \
            --build-arg "BASE_IMAGE=${{ matrix.base_image }}" \
            --build-arg "PRODUCT=containers-common" \
            --build-arg "DISTRO_FAMILY=${{ matrix.distro_family }}" \
            --build-arg "DISTRO=${{ matrix.distro }}" \
            --build-arg "BUILD_VERSION=${BUILD_VERSION}" \
            --build-arg "BUILD_REVISION=${BUILD_REVISION}" \
            --build-arg "CONTAINERS_COMMON_TAG=${CONTAINERS_COMMON_TAG}" \
            --build-arg "CONTAINERS_COMMON_VERSION=${CONTAINERS_COMMON_VERSION}" \
            --build-arg "CONTAINERS_COMMON_ARCHIVE_SHA256=${CONTAINERS_COMMON_ARCHIVE_SHA256}" \
            --build-arg "TARGET_ARCH=amd64" \
            --target artifact-export \
            --output "type=local,dest=output" \
            --file docker/Dockerfile \
            .
      - name: List built artifacts
        run: find output/ -type f | sort
      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: containers-common-debs-${{ matrix.distro }}-amd64
          path: output/${{ matrix.distro }}/${{ needs.prepare.outputs.build_version }}/amd64/*.deb
          retention-days: 7
          if-no-files-found: error
      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: containers-common-metadata-${{ matrix.distro }}-amd64
          path: |
            output/${{ matrix.distro }}/${{ needs.prepare.outputs.build_version }}/amd64/SHA256SUMS
            output/${{ matrix.distro }}/${{ needs.prepare.outputs.build_version }}/amd64/build.log
          retention-days: 30
          if-no-files-found: warn

  publish:
    needs:
      - prepare
      - fetch-passt
      - build-compiled
      - build-containers-common
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download all .deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-debs-*'
          path: debs
          merge-multiple: true
      - name: Normalize release asset filenames
        run: |
          cd debs
          shopt -s nullglob
          for file in *.deb; do
            # GitHub release uploads normalize '~' to '.', so do the same before
            # checksums are generated.
            normalized="${file//\~/.}"
            if [[ "${normalized}" == "${file}" ]]; then
              continue
            fi
            if [[ -e "${normalized}" ]]; then
              echo "::error::Cannot rename ${file} to ${normalized}; target already exists"
              exit 1
            fi
            mv -- "${file}" "${normalized}"
          done
      - name: Generate checksums
        run: |
          cd debs
          find . -name '*.deb' -exec sha256sum {} \; | sed 's|  \./|  |' | sort > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS
      - name: Upload assets to draft release
        run: |
          RELEASE_TAG="${{ needs.prepare.outputs.release_tag }}"

          gh release upload "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --clobber \
            debs/*.deb debs/SHA256SUMS
      - name: Publish release
        run: |
          PODMAN_VERSION="${{ needs.prepare.outputs.podman_version }}"
          BUILD_VERSION="${{ needs.prepare.outputs.build_version }}"
          RELEASE_REVISION="${{ needs.prepare.outputs.release_revision }}"
          RELEASE_TAG="${{ needs.prepare.outputs.release_tag }}"

          gh release edit "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --draft=false \
            --prerelease \
            --title "Podman ${PODMAN_VERSION} companion .deb packages - ${BUILD_VERSION}-${RELEASE_REVISION}" \
            --notes "$(cat <<EOF
          ## Podman ${PODMAN_VERSION} companion .deb packages

          Supporting packages required alongside Podman ${PODMAN_VERSION}, built
          or pinned for amd64 and arm64 (containers-common is \`Architecture: all\`):
          - passt ${{ needs.prepare.outputs.passt_version }} (exact Ubuntu and Debian binaries)
          - netavark ${{ needs.prepare.outputs.netavark_version }}
          - aardvark-dns ${{ needs.prepare.outputs.aardvark_version }}
          - crun ${{ needs.prepare.outputs.crun_version }}
          - conmon ${{ needs.prepare.outputs.conmon_version }}
          - containers-common ${{ needs.prepare.outputs.cc_version }}
          - containers-storage ${{ needs.prepare.outputs.cs_version }}

          Targets:
          - Ubuntu 24.04 (noble)
          - Ubuntu 26.04 (resolute)
          - Debian 13 (trixie)

          Build date: ${BUILD_VERSION}
          Build revision: ${RELEASE_REVISION}

          ### SHA256 Checksums
          \`\`\`
          $(cat debs/SHA256SUMS)
          \`\`\`
          EOF
          )"
