name: Build and Release Podman .deb Packages

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      build_version: ${{ steps.vars.outputs.build_version }}
      podman_tag: ${{ steps.vars.outputs.podman_tag }}
      podman_version: ${{ steps.vars.outputs.podman_version }}
      upstream_sha256: ${{ steps.vars.outputs.upstream_sha256 }}
      release_revision: ${{ steps.tags.outputs.release_revision }}
      release_tag: ${{ steps.tags.outputs.release_tag }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute shared build variables
        id: vars
        run: |
          source packaging/versions.env
          echo "build_version=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "podman_tag=${PODMAN_TAG}" >> "$GITHUB_OUTPUT"
          echo "podman_version=${PODMAN_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "upstream_sha256=${UPSTREAM_SHA256}" >> "$GITHUB_OUTPUT"
      - name: Resolve release tag
        id: tags
        run: |
          PODMAN_TAG="${{ steps.vars.outputs.podman_tag }}"
          BUILD_VERSION="${{ steps.vars.outputs.build_version }}"

          # All distros from this run share a single release. Find the next
          # free revision for the unified tag so re-runs on the same day do
          # not collide with an existing release.
          REVISION=1
          while gh release view "${PODMAN_TAG}-${BUILD_VERSION}-${REVISION}" --repo "${{ github.repository }}" >/dev/null 2>&1; do
            REVISION=$((REVISION + 1))
          done

          RELEASE_TAG="${PODMAN_TAG}-${BUILD_VERSION}-${REVISION}"
          echo "release_revision=${REVISION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: ${RELEASE_TAG} (revision ${REVISION})"
      - name: Create draft release
        run: |
          PODMAN_VERSION="${{ steps.vars.outputs.podman_version }}"
          PODMAN_TAG="${{ steps.vars.outputs.podman_tag }}"
          BUILD_VERSION="${{ steps.vars.outputs.build_version }}"
          RELEASE_TAG="${{ steps.tags.outputs.release_tag }}"
          RELEASE_REVISION="${{ steps.tags.outputs.release_revision }}"

          gh release create "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --draft \
            --prerelease \
            --title "Podman ${PODMAN_VERSION} .deb packages - ${BUILD_VERSION}-${RELEASE_REVISION}" \
            --notes "$(cat <<EOF
          ## Podman ${PODMAN_VERSION} .deb packages

          Targets (amd64 and arm64):
          - Ubuntu 24.04 (noble)
          - Ubuntu 26.04 (resolute)
          - Debian 13 (trixie)

          Build date: ${BUILD_VERSION}
          Build revision: ${RELEASE_REVISION}
          Upstream tag: ${PODMAN_TAG}

          SHA256 checksums are attached as \`SHA256SUMS\`.
          EOF
          )"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: noble
            arch: amd64
            runner: ubuntu-24.04
            dockerfile: docker/Dockerfile.ubuntu-noble
          - distro: noble
            arch: arm64
            runner: ubuntu-24.04-arm
            dockerfile: docker/Dockerfile.ubuntu-noble
          - distro: trixie
            arch: amd64
            runner: ubuntu-24.04
            dockerfile: docker/Dockerfile.debian-trixie
          - distro: trixie
            arch: arm64
            runner: ubuntu-24.04-arm
            dockerfile: docker/Dockerfile.debian-trixie
          - distro: resolute
            arch: amd64
            runner: ubuntu-24.04
            dockerfile: docker/Dockerfile.ubuntu-resolute
          - distro: resolute
            arch: arm64
            runner: ubuntu-24.04-arm
            dockerfile: docker/Dockerfile.ubuntu-resolute
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Build .deb packages
        env:
          BUILD_VERSION: ${{ needs.prepare.outputs.build_version }}
          BUILD_REVISION: ${{ needs.prepare.outputs.release_revision }}
          PODMAN_TAG: ${{ needs.prepare.outputs.podman_tag }}
          UPSTREAM_SHA256: ${{ needs.prepare.outputs.upstream_sha256 }}
        run: |
          docker build \
            --pull \
            --no-cache \
            --build-arg "DISTRO=${{ matrix.distro }}" \
            --build-arg "BUILD_VERSION=${BUILD_VERSION}" \
            --build-arg "BUILD_REVISION=${BUILD_REVISION}" \
            --build-arg "PODMAN_TAG=${PODMAN_TAG}" \
            --build-arg "UPSTREAM_SHA256=${UPSTREAM_SHA256}" \
            --build-arg "TARGET_ARCH=${{ matrix.arch }}" \
            --target artifact-export \
            --output "type=local,dest=output" \
            --file "${{ matrix.dockerfile }}" \
            .
      - name: List built artifacts
        run: find output/ -type f | sort
      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.distro }}-${{ matrix.arch }}
          path: output/${{ matrix.distro }}/${{ needs.prepare.outputs.build_version }}/${{ matrix.arch }}/*.deb
          retention-days: 7
          if-no-files-found: error
      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: metadata-${{ matrix.distro }}-${{ matrix.arch }}
          path: |
            output/${{ matrix.distro }}/${{ needs.prepare.outputs.build_version }}/${{ matrix.arch }}/SHA256SUMS
            output/${{ matrix.distro }}/${{ needs.prepare.outputs.build_version }}/${{ matrix.arch }}/build.log
          retention-days: 30
          if-no-files-found: warn

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download all .deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          path: debs
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd debs
          find . -name '*.deb' -exec sha256sum {} \; | sed 's|  \./|  |' | sort > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS
      - name: Upload assets to draft release
        run: |
          RELEASE_TAG="${{ needs.prepare.outputs.release_tag }}"

          gh release upload "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --clobber \
            debs/*.deb debs/SHA256SUMS
      - name: Publish release
        run: |
          PODMAN_VERSION="${{ needs.prepare.outputs.podman_version }}"
          PODMAN_TAG="${{ needs.prepare.outputs.podman_tag }}"
          BUILD_VERSION="${{ needs.prepare.outputs.build_version }}"
          RELEASE_REVISION="${{ needs.prepare.outputs.release_revision }}"
          RELEASE_TAG="${{ needs.prepare.outputs.release_tag }}"

          # All matrix builds succeeded (publish only runs when the build job
          # passes), so flip the draft to a published pre-release with the full
          # checksum manifest in the notes.
          gh release edit "${RELEASE_TAG}" \
            --repo "${{ github.repository }}" \
            --draft=false \
            --prerelease \
            --title "Podman ${PODMAN_VERSION} .deb packages - ${BUILD_VERSION}-${RELEASE_REVISION}" \
            --notes "$(cat <<EOF
          ## Podman ${PODMAN_VERSION} .deb packages

          Targets (amd64 and arm64):
          - Ubuntu 24.04 (noble)
          - Ubuntu 26.04 (resolute)
          - Debian 13 (trixie)

          Build date: ${BUILD_VERSION}
          Build revision: ${RELEASE_REVISION}
          Upstream tag: ${PODMAN_TAG}

          ### SHA256 Checksums
          \`\`\`
          $(cat debs/SHA256SUMS)
          \`\`\`
          EOF
          )"
